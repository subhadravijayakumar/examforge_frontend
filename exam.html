<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ExamForge — Exam</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Outfit',sans-serif; background:#f8f8ff; color:#0d0d1a; min-height:100vh; }

    .exam-wrap { max-width:780px; margin:0 auto; padding:32px 20px; }

    .exam-header {
      display:flex; align-items:center; justify-content:space-between;
      flex-wrap:wrap; gap:16px; margin-bottom:20px;
    }
    .exam-title { font-size:20px; font-weight:800; }
    .exam-topic { font-size:13px; color:#6b7280; }

    .level-badge { padding:6px 18px; border-radius:100px; font-size:13px; font-weight:700; }
    .level-easy   { background:rgba(16,185,129,0.12); color:#059669; border:1px solid rgba(16,185,129,0.3); }
    .level-medium { background:rgba(245,158,11,0.12); color:#d97706; border:1px solid rgba(245,158,11,0.3); }
    .level-hard   { background:rgba(239,68,68,0.12);  color:#dc2626; border:1px solid rgba(239,68,68,0.3); }

    .timer { font-size:22px; font-weight:800; color:#0d0d1a; }
    .timer.warning { color:#f59e0b; animation:pulse 1s infinite; }
    .timer.danger  { color:#ef4444; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    .progress-wrap {
      height:6px; background:#e5e7eb;
      border-radius:100px; margin-bottom:24px; overflow:hidden;
    }
    .progress-fill {
      height:100%; border-radius:100px;
      background:linear-gradient(90deg,#6366f1,#ec4899);
      transition:width .4s;
    }

    .question-card {
      background:#fff; border-radius:20px;
      border:1px solid rgba(0,0,0,0.07);
      padding:36px; box-shadow:0 4px 20px rgba(0,0,0,0.06);
      margin-bottom:20px;
      transition:box-shadow .3s;
    }
    .question-card.flash-correct { box-shadow:0 0 0 3px #10b981, 0 4px 20px rgba(16,185,129,0.2); }
    .question-card.flash-wrong   { box-shadow:0 0 0 3px #ef4444, 0 4px 20px rgba(239,68,68,0.2); }

    .q-meta { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
    .q-num  { font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:#9ca3af; }
    .q-tag  { padding:3px 10px; border-radius:6px; background:rgba(99,102,241,0.10); font-size:12px; color:#6366f1; font-weight:600; }
    .q-marks{ margin-left:auto; padding:3px 10px; border-radius:6px; background:rgba(16,185,129,0.10); font-size:12px; color:#059669; font-weight:700; }

    .question-text { font-size:20px; font-weight:600; line-height:1.5; margin-bottom:24px; }

    .options { display:flex; flex-direction:column; gap:12px; }
    .option {
      padding:14px 20px; border-radius:12px;
      border:2px solid #e5e7eb; cursor:pointer;
      font-size:15px; transition:all .2s;
      display:flex; align-items:center; gap:14px;
      background:#fafafa;
    }
    .option:hover:not(.disabled) {
      border-color:#6366f1;
      background:rgba(99,102,241,0.04);
      transform:translateX(4px);
    }
    .option.selected { border-color:#6366f1; background:rgba(99,102,241,0.06); }
    .option.correct  { border-color:#10b981; background:#f0fdf4; color:#065f46; font-weight:600; }
    .option.wrong    { border-color:#ef4444; background:#fef2f2; color:#991b1b; }
    .option.disabled { cursor:not-allowed; }
    .option-key {
      width:28px; height:28px; border-radius:8px;
      background:#f3f4f6; font-size:12px; font-weight:700;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }

    .explanation {
      margin-top:14px; padding:12px 16px;
      background:rgba(99,102,241,0.06);
      border-radius:10px; font-size:13px;
      color:#6b7280; border-left:3px solid #6366f1;
      line-height:1.5;
    }

    .exam-actions {
      display:flex; justify-content:space-between; align-items:center;
    }
    .answered-count { font-size:13px; color:#6b7280; }

    .btn {
      padding:10px 24px; border-radius:10px; border:none;
      cursor:pointer; font-family:'Outfit',sans-serif;
      font-size:14px; font-weight:600; transition:all .2s;
    }
    .btn-primary {
      background:linear-gradient(135deg,#6366f1,#8b5cf6);
      color:#fff; box-shadow:0 4px 14px rgba(99,102,241,0.3);
    }
    .btn-primary:hover { transform:translateY(-2px); }
    .btn-primary:disabled { opacity:.5; cursor:not-allowed; transform:none; }
    .btn-ghost {
      background:transparent; color:#6b7280;
      border:1px solid #e5e7eb;
    }
    .btn-ghost:hover { border-color:#6366f1; color:#6366f1; }

    /* Score tracker */
    .score-tracker {
      display:flex; gap:16px; margin-bottom:16px;
      background:#fff; border-radius:14px;
      padding:14px 20px; border:1px solid rgba(0,0,0,0.07);
      flex-wrap:wrap;
    }
    .score-item { text-align:center; flex:1; }
    .score-item-val   { font-size:20px; font-weight:800; line-height:1; margin-bottom:3px; }
    .score-item-label { font-size:11px; color:#9ca3af; text-transform:uppercase; letter-spacing:.5px; }

    /* Level transition overlay */
    .level-transition {
      position:fixed; inset:0;
      background:rgba(248,248,255,0.97);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      z-index:1000; gap:16px;
      animation:fadeIn .4s ease;
    }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    .lt-icon  { font-size:80px; animation:bounce .6s ease; }
    @keyframes bounce { 0%{transform:scale(0)} 70%{transform:scale(1.2)} 100%{transform:scale(1)} }

    .lt-title { font-size:36px; font-weight:800; color:#0d0d1a; }
    .lt-sub   { font-size:16px; color:#6b7280; text-align:center; max-width:340px; }

    .lt-arrow {
      display:flex; align-items:center; gap:16px;
      font-size:18px; font-weight:700; margin:4px 0;
    }

    .lt-marks-info {
      font-size:14px; font-weight:600; color:#6366f1;
      padding:6px 18px; border-radius:100px;
      background:rgba(99,102,241,0.08);
      border:1px solid rgba(99,102,241,0.2);
    }

    .lt-continue {
      padding:14px 36px; border-radius:12px;
      background:linear-gradient(135deg,#6366f1,#8b5cf6);
      color:#fff; font-weight:700; font-size:16px;
      border:none; cursor:pointer; margin-top:8px;
      box-shadow:0 6px 20px rgba(99,102,241,0.35);
      transition:all .2s;
    }
    .lt-continue:hover { transform:translateY(-2px); }

    /* End exam summary */
    .end-overlay {
      position:fixed; inset:0;
      background:rgba(248,248,255,0.97);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      z-index:1000; gap:12px;
      animation:fadeIn .4s ease;
    }

    @media(max-width:600px){
      .exam-wrap { padding:20px 16px; }
      .question-text { font-size:16px; }
      .option { font-size:13px; padding:12px 14px; }
      .lt-title { font-size:26px; }
    }
  </style>
</head>
<body>

<div class="exam-wrap">

  <!-- Header -->
  <div class="exam-header">
    <div>
      <div class="exam-title" id="exam-title">Loading...</div>
      <div class="exam-topic" id="exam-topic"></div>
    </div>
    <div class="level-badge level-easy" id="level-badge">🟢 Easy Level</div>
    <div class="timer" id="timer">⏱ 30:00</div>
  </div>

  <!-- Progress bar -->
  <div class="progress-wrap">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <!-- Score tracker -->
  <div class="score-tracker">
    <div class="score-item">
      <div class="score-item-val" id="track-marks" style="color:#6366f1">0</div>
      <div class="score-item-label">Marks</div>
    </div>
    <div class="score-item">
      <div class="score-item-val" id="track-correct" style="color:#10b981">0</div>
      <div class="score-item-label">Correct</div>
    </div>
    <div class="score-item">
      <div class="score-item-val" id="track-wrong" style="color:#ef4444">0</div>
      <div class="score-item-label">Wrong</div>
    </div>
    <div class="score-item">
      <div class="score-item-val" id="track-level" style="color:#f59e0b">Easy</div>
      <div class="score-item-label">Current Level</div>
    </div>
  </div>

  <!-- Question card -->
  <div class="question-card" id="question-card">
    <div class="q-meta">
      <div class="q-num"   id="q-num">Q 1 of 9</div>
      <div class="q-tag"   id="q-tag">Subject</div>
      <div class="q-marks" id="q-marks">+1 mark</div>
    </div>
    <div class="question-text" id="question-text">Loading...</div>
    <div class="options"       id="options-container"></div>
  </div>

  <!-- Actions -->
  <div class="exam-actions">
    <div class="answered-count" id="answered-count">0 answered</div>
    <div style="display:flex;gap:12px">
      <button class="btn btn-ghost"   onclick="skipQuestion()">Skip →</button>
      <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()" disabled>Next →</button>
    </div>
  </div>

</div>

<script src="shared.js"></script>

// ══════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════
const MARKS         = { easy:1, medium:3, hard:5 };
const MAX_QUESTIONS = 9;

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let state = {
  subject: '',
  level: 'easy',
  questionCount: 0,
  correctCount: 0,
  wrongCount: 0,
  totalMarks: 0,
  maxMarks: MAX_QUESTIONS * 5,
  lastAnswerCorrect: false,
  currentQ: null,
  locked: false,
  usedQs: { easy:[], medium:[], hard:[] },
  levelStats: { easy:{correct:0,wrong:0,marks:0}, medium:{correct:0,wrong:0,marks:0}, hard:{correct:0,wrong:0,marks:0} },
  timer: null,
  timeLeft: 30 * 60
};

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
window.onload = function() {
  const params   = new URLSearchParams(window.location.search);
  state.subject  = params.get('subject') || 'Mathematics';

  // fallback if subject not in bank
  if (!QUESTIONS[state.subject]) {
    state.subject = 'Mathematics';
  }

  document.getElementById('exam-title').textContent = state.subject + ' Adaptive Exam';
  document.getElementById('exam-topic').textContent  = 'Subject: ' + state.subject;

  loadQuestion();
  startTimer();
};

// ══════════════════════════════════════════
//  GET NEXT QUESTION
// ══════════════════════════════════════════
function getNextQuestion(level) {
  const pool = (QUESTIONS[state.subject]?.[level] || [])
    .filter((_, i) => !state.usedQs[level].includes(i));

  if (!pool.length) {
    // reset used questions for this level if exhausted
    state.usedQs[level] = [];
    return QUESTIONS[state.subject]?.[level]?.[0] || null;
  }

  const ridx    = Math.floor(Math.random() * pool.length);
  const q       = pool[ridx];
  const origIdx = (QUESTIONS[state.subject]?.[level] || []).indexOf(q);
  state.usedQs[level].push(origIdx);
  return q;
}

// ══════════════════════════════════════════
//  LOAD QUESTION
// ══════════════════════════════════════════
function loadQuestion() {
  if (state.questionCount >= MAX_QUESTIONS) {
    endExam();
    return;
  }

  // Update progress
  const pct = (state.questionCount / MAX_QUESTIONS) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('q-num').textContent = 'Q ' + (state.questionCount + 1) + ' of ' + MAX_QUESTIONS;

  // Update level badge
  const badges  = { easy:'🟢 Easy Level', medium:'🟡 Medium Level', hard:'🔴 Hard Level' };
  const classes  = { easy:'level-easy',   medium:'level-medium',   hard:'level-hard' };
  const badge    = document.getElementById('level-badge');
  badge.textContent = badges[state.level];
  badge.className   = 'level-badge ' + classes[state.level];

  // Update marks tag
  document.getElementById('q-marks').textContent = '+' + MARKS[state.level] + ' mark' + (MARKS[state.level] > 1 ? 's' : '');
  document.getElementById('q-tag').textContent   = state.subject;

  // Update score tracker
  updateTracker();

  // Get question
  const q = getNextQuestion(state.level);
  if (!q) { endExam(); return; }
  state.currentQ = q;
  state.locked   = false;

  // Render question
  document.getElementById('question-text').textContent = q.q;

  const keys = ['A', 'B', 'C', 'D'];
  document.getElementById('options-container').innerHTML =
    q.opts.map((o, i) => `
      <div class="option" id="opt-${i}" onclick="selectOption(${i})">
        <span class="option-key">${keys[i]}</span>
        <span>${o}</span>
      </div>`).join('');

  // Reset button
  document.getElementById('next-btn').disabled  = true;
  document.getElementById('next-btn').textContent =
    (state.questionCount + 1) >= MAX_QUESTIONS ? 'Finish' : 'Next →';
  document.getElementById('answered-count').textContent = state.correctCount + state.wrongCount + ' answered';

  // Remove flash
  const card = document.getElementById('question-card');
  card.classList.remove('flash-correct', 'flash-wrong');
}

// ══════════════════════════════════════════
//  SELECT OPTION
// ══════════════════════════════════════════
function selectOption(idx) {
  if (state.locked) return;
  state.locked = true;

  const correct = state.currentQ.ans === idx;
  state.lastAnswerCorrect = correct;
  state.questionCount++;

  // Flash card
  const card = document.getElementById('question-card');
  if (correct) {
    card.classList.add('flash-correct');
    state.correctCount++;
    state.totalMarks += MARKS[state.level];
    state.levelStats[state.level].correct++;
    state.levelStats[state.level].marks += MARKS[state.level];
  } else {
    card.classList.add('flash-wrong');
    state.wrongCount++;
    state.levelStats[state.level].wrong++;
  }

  // Highlight options
  document.querySelectorAll('.option').forEach((el, i) => {
    el.classList.add('disabled');
    if (i === idx) el.classList.add(correct ? 'correct' : 'wrong');
    if (!correct && i === state.currentQ.ans) el.classList.add('correct');
  });

  // Show explanation if wrong
  if (!correct && state.currentQ.exp) {
    setTimeout(() => {
      const exp     = document.createElement('div');
      exp.className = 'explanation';
      exp.innerHTML = '💡 ' + state.currentQ.exp;
      document.getElementById('options-container').appendChild(exp);
    }, 300);
  }

  updateTracker();
  document.getElementById('next-btn').disabled = false;
}

// ══════════════════════════════════════════
//  NEXT QUESTION — ADAPTIVE LOGIC
// ══════════════════════════════════════════
function nextQuestion() {
  if (state.questionCount >= MAX_QUESTIONS) {
    endExam();
    return;
  }

  const wasCorrect = state.lastAnswerCorrect;

  if (state.level === 'easy') {
    if (wasCorrect) {
      // ✅ Easy correct → Level UP to Medium
      showLevelTransition('easy', 'medium', true,
        '🎉 Correct! Level Up!',
        'You answered correctly! Moving to Medium level.');
    } else {
      // ❌ Easy wrong → Stay at Easy
      loadQuestion();
    }
    return;
  }

  if (state.level === 'medium') {
    if (wasCorrect) {
      // ✅ Medium correct → Level UP to Hard
      showLevelTransition('medium', 'hard', true,
        '🔥 Excellent! Level Up!',
        'Amazing! Moving to Hard level — 5 marks per question!');
    } else {
      // ❌ Medium wrong → Go DOWN to Easy
      showLevelTransition('medium', 'easy', false,
        '💪 Keep Going!',
        'Going back to Easy level — build your foundation!');
    }
    return;
  }

  if (state.level === 'hard') {
    if (wasCorrect) {
      // ✅ Hard correct → Stay at Hard
      loadQuestion();
    } else {
      // ❌ Hard wrong → Go DOWN to Medium
      showLevelTransition('hard', 'medium', false,
        '📚 Good Try!',
        'Going back to Medium level — keep practising!');
    }
    return;
  }
}

// ══════════════════════════════════════════
//  SKIP QUESTION
// ══════════════════════════════════════════
function skipQuestion() {
  if (state.locked) return;
  state.questionCount++;
  state.wrongCount++;
  state.lastAnswerCorrect = false;
  updateTracker();

  if (state.questionCount >= MAX_QUESTIONS) {
    endExam();
    return;
  }

  // Skipping counts as wrong → apply same down-level logic
  if (state.level === 'medium') {
    showLevelTransition('medium', 'easy', false, '⏭️ Skipped!', 'Going back to Easy level.');
  } else if (state.level === 'hard') {
    showLevelTransition('hard', 'medium', false, '⏭️ Skipped!', 'Going back to Medium level.');
  } else {
    loadQuestion();
  }
}

// ══════════════════════════════════════════
//  LEVEL TRANSITION OVERLAY
// ══════════════════════════════════════════
function showLevelTransition(from, to, goingUp, title, subtitle) {
  const div   = document.createElement('div');
  div.className = 'level-transition';

  const names  = { easy:'Easy', medium:'Medium', hard:'Hard' };
  const icons  = { easy:'🟢',  medium:'🟡',     hard:'🔴' };
  const colors = { easy:'#10b981', medium:'#f59e0b', hard:'#ef4444' };

  div.innerHTML = `
    <div class="lt-icon">${goingUp ? '🚀' : '📖'}</div>
    <div class="lt-title">${title}</div>
    <div class="lt-sub">${subtitle}</div>
    <div class="lt-arrow">
      <span style="color:${colors[from]}">${icons[from]} ${names[from]}</span>
      <span style="color:#9ca3af;font-size:22px">${goingUp ? '→' : '←'}</span>
      <span style="color:${colors[to]}">${icons[to]} ${names[to]}</span>
    </div>
    <div class="lt-marks-info">+${MARKS[to]} mark${MARKS[to] > 1 ? 's' : ''} per correct answer</div>
    <button class="lt-continue"
      onclick="continueExam('${to}', this.parentElement)">
      Continue →
    </button>`;

  document.body.appendChild(div);
}

function continueExam(level, el) {
  state.level = level;
  document.body.removeChild(el);
  loadQuestion();
}

// ══════════════════════════════════════════
//  UPDATE SCORE TRACKER
// ══════════════════════════════════════════
function updateTracker() {
  document.getElementById('track-marks').textContent   = state.totalMarks;
  document.getElementById('track-correct').textContent = state.correctCount;
  document.getElementById('track-wrong').textContent   = state.wrongCount;
  document.getElementById('track-level').textContent   =
    state.level.charAt(0).toUpperCase() + state.level.slice(1);
}

// ══════════════════════════════════════════
//  TIMER
// ══════════════════════════════════════════
function startTimer() {
  if (state.timer) clearInterval(state.timer);
  state.timer = setInterval(() => {
    state.timeLeft--;
    const m  = Math.floor(state.timeLeft / 60).toString().padStart(2, '0');
    const s  = (state.timeLeft % 60).toString().padStart(2, '0');
    const el = document.getElementById('timer');
    el.textContent = '⏱ ' + m + ':' + s;
    if (state.timeLeft <= 300) el.className = 'timer warning';
    if (state.timeLeft <= 60)  el.className = 'timer danger';
    if (state.timeLeft <= 0)   { clearInterval(state.timer); endExam(); }
  }, 1000);
}

// ══════════════════════════════════════════
//  END EXAM
// ══════════════════════════════════════════
function endExam() {
  clearInterval(state.timer);

  const pct = Math.round((state.totalMarks / (MAX_QUESTIONS * MARKS.hard)) * 100);

  // Determine highest level reached
  const levelReached =
    state.levelStats.hard.correct > 0   ? 'Hard'   :
    state.levelStats.medium.correct > 0 ? 'Medium' : 'Easy';

  const result = {
    subject:       state.subject,
    totalMarks:    state.totalMarks,
    maxMarks:      MAX_QUESTIONS * MARKS.hard,
    percentage:    pct,
    correctCount:  state.correctCount,
    wrongCount:    state.wrongCount,
    levelReached:  levelReached,
    easyCorrect:   state.levelStats.easy.correct,
    mediumCorrect: state.levelStats.medium.correct,
    hardCorrect:   state.levelStats.hard.correct,
    easyMarks:     state.levelStats.easy.marks,
    mediumMarks:   state.levelStats.medium.marks,
    hardMarks:     state.levelStats.hard.marks,
    timeLeft:      state.timeLeft,
    timeTakenSeconds: (30 * 60) - state.timeLeft,
    completedAt:   new Date().toISOString()
  };

  sessionStorage.setItem('ef_result', JSON.stringify(result));
  updateStudentProgressFromResult(result);

  window.location.href = 'result.html';
}

</script>
