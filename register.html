<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ExamForge — Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Outfit',sans-serif; min-height:100vh; background:#f8f8ff; display:flex; flex-direction:column; }
    .bg { position:fixed; inset:0; z-index:0; background: radial-gradient(ellipse 60% 60% at 90% 20%, rgba(99,102,241,0.10) 0%, transparent 60%), radial-gradient(ellipse 50% 40% at 10% 80%, rgba(236,72,153,0.08) 0%, transparent 60%), #f8f8ff; }
    nav { position:relative; z-index:10; display:flex; align-items:center; justify-content:space-between; padding:18px 60px; background:rgba(255,255,255,0.80); backdrop-filter:blur(16px); border-bottom:1px solid rgba(99,102,241,0.10); }
    .brand { display:flex; align-items:center; gap:10px; text-decoration:none; }
    .brand-icon { width:38px; height:38px; border-radius:12px; background:linear-gradient(135deg,#6366f1,#ec4899); display:flex; align-items:center; justify-content:center; font-size:18px; color:#fff; font-weight:800; }
    .brand-name { font-size:19px; font-weight:800; background:linear-gradient(135deg,#6366f1,#ec4899); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .back-link { font-size:14px; color:#6b7280; text-decoration:none; transition:color .2s; }
    .back-link:hover { color:#6366f1; }
    main { position:relative; z-index:1; flex:1; display:flex; align-items:center; justify-content:center; padding:48px 20px; }
    .reg-box { background:#fff; border-radius:24px; border:1px solid rgba(0,0,0,0.07); padding:48px; width:100%; max-width:500px; box-shadow:0 16px 56px rgba(99,102,241,0.12); }
    .reg-top { text-align:center; margin-bottom:28px; }
    .reg-icon { width:56px; height:56px; border-radius:16px; background:linear-gradient(135deg,#6366f1,#ec4899); display:flex; align-items:center; justify-content:center; font-size:26px; color:#fff; font-weight:800; margin:0 auto 12px; }
    .reg-title { font-size:24px; font-weight:800; color:#0d0d1a; margin-bottom:4px; }
    .reg-sub { font-size:14px; color:#6b7280; }
    .tab-row { display:flex; background:#f3f4f6; border-radius:12px; padding:4px; margin-bottom:24px; }
    .tab { flex:1; padding:9px; text-align:center; border-radius:10px; cursor:pointer; font-size:14px; font-weight:600; color:#6b7280; transition:all .2s; }
    .tab.active { background:#fff; color:#6366f1; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .form-group { margin-bottom:16px; }
    label { display:block; font-size:13px; font-weight:600; color:#374151; margin-bottom:7px; }
    input, select { width:100%; padding:12px 16px; background:#f9fafb; border:1.5px solid #e5e7eb; border-radius:10px; color:#0d0d1a; font-family:'Outfit',sans-serif; font-size:14px; outline:none; transition:all .2s; }
    input:focus, select:focus { border-color:#6366f1; background:#fff; box-shadow:0 0 0 3px rgba(99,102,241,0.10); }
    input::placeholder { color:#9ca3af; }
    .btn-reg { width:100%; padding:13px; border-radius:12px; background:linear-gradient(135deg,#6366f1,#8b5cf6); color:#fff; font-weight:700; font-size:15px; border:none; cursor:pointer; font-family:'Outfit',sans-serif; box-shadow:0 4px 16px rgba(99,102,241,0.30); transition:all .2s; margin-top:8px; }
    .btn-reg:hover { transform:translateY(-2px); }
    .switch-link { text-align:center; font-size:13px; color:#6b7280; margin-top:16px; }
    .switch-link a { color:#6366f1; font-weight:600; text-decoration:none; }
    .error-msg { background:#fef2f2; border:1px solid #fecaca; border-radius:10px; padding:10px 14px; font-size:13px; color:#dc2626; margin-bottom:16px; display:none; }
    .teacher-fields { display:none; }
  </style>
</head>
<body>
<div class="bg"></div>
<nav>
  <a class="brand" href="index.html"><div class="brand-icon">E</div><div class="brand-name">ExamForge</div></a>
  <a class="back-link" href="login.html">← Already have an account?</a>
</nav>
<main>
  <div class="reg-box">
    <div class="reg-top">
      <div class="reg-icon">E</div>
      <div class="reg-title">Create your account</div>
      <div class="reg-sub">Join ExamForge and start learning smarter</div>
    </div>
    <div class="tab-row">
      <div class="tab active" id="tab-student" onclick="setTab('student')">🎓 Student</div>
      <div class="tab" id="tab-teacher" onclick="setTab('teacher')">👨‍🏫 Teacher</div>
    </div>
    <div class="error-msg" id="error-msg"></div>
    <div class="form-row">
      <div class="form-group"><label>First Name</label><input type="text" id="fname" placeholder="Arjun"/></div>
      <div class="form-group"><label>Last Name</label><input type="text" id="lname" placeholder="Kumar"/></div>
    </div>
    <div class="form-group"><label>Email Address</label><input type="email" id="email" placeholder="you@example.com"/></div>
    <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="Min 8 characters"/></div>
    <div class="form-group"><label>Confirm Password</label><input type="password" id="cpassword" placeholder="Repeat password"/></div>
    <div id="student-fields">
      <div class="form-row">
        <div class="form-group"><label>Class / Year</label>
          <select id="className">
            <option>Class 10</option><option>Class 11</option>
            <option>Class 12</option><option>1st Year UG</option>
            <option>2nd Year UG</option>
          </select>
        </div>
        <div class="form-group"><label>Institution</label><input type="text" id="school" placeholder="Your school/college"/></div>
      </div>
    </div>
    <div id="teacher-fields" class="teacher-fields">
      <div class="form-group"><label>Department</label><input type="text" id="dept" placeholder="e.g. Mathematics"/></div>
      <div class="form-group"><label>Institution</label><input type="text" id="inst" placeholder="School or College name"/></div>
    </div>
    <button class="btn-reg" onclick="doRegister()">Create Account →</button>
    <div class="switch-link">Already have an account? <a href="login.html">Sign in</a></div>
  </div>
</main>
<script>
  let currentRole = 'STUDENT';
  function setTab(role) {
    currentRole = role.toUpperCase();
    document.getElementById('tab-student').classList.toggle('active', role==='student');
    document.getElementById('tab-teacher').classList.toggle('active', role==='teacher');
    document.getElementById('student-fields').style.display = role==='student'?'block':'none';
    document.getElementById('teacher-fields').style.display = role==='teacher'?'block':'none';
  }
  async function doRegister() {
    const fname    = document.getElementById('fname').value.trim();
    const lname    = document.getElementById('lname').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const cpass    = document.getElementById('cpassword').value;
    const errorEl  = document.getElementById('error-msg');
    const className= document.getElementById('className')?.value || '';
    if (!fname||!email||!password) { errorEl.textContent='Fill all required fields'; errorEl.style.display='block'; return; }
    if (password !== cpass) { errorEl.textContent='Passwords do not match'; errorEl.style.display='block'; return; }
    if (password.length < 8) { errorEl.textContent='Password must be at least 8 characters'; errorEl.style.display='block'; return; }
    try {
      const response = await fetch('http://localhost:8080/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: fname+' '+lname, email, password, role: currentRole, className })
      });
      const data = await response.json();
      if (response.ok) {
        sessionStorage.setItem('token', data.token);
        sessionStorage.setItem('ef_user', JSON.stringify({ name:data.name, email:data.email, role:data.role, userId:data.userId }));
        window.location.href = data.role==='TEACHER' ? 'teacher-dashboard.html' : 'student-dashboard.html';
      } else {
        errorEl.textContent = data.message || 'Registration failed';
        errorEl.style.display = 'block';
      }
    } catch(err) {
      errorEl.textContent = 'Cannot connect to server. Make sure backend is running!';
      errorEl.style.display = 'block';
    }
  }
</script>
</body>
</html>
