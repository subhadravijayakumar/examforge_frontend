<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ExamForge - Analytics</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Outfit',sans-serif; background:#f8f8ff; color:#0d0d1a; min-height:100vh; }
    .page-body { padding:36px 40px; max-width:1200px; margin:0 auto; }
    .page-title { font-size:26px; font-weight:800; margin-bottom:6px; }
    .page-sub { font-size:15px; color:#6b7280; margin-bottom:28px; }
    .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:18px; margin-bottom:28px; }
    .stat-card { background:#fff; border-radius:16px; padding:22px; border:1px solid rgba(0,0,0,0.06); }
    .stat-icon { font-size:26px; margin-bottom:12px; }
    .stat-val { font-size:30px; font-weight:800; line-height:1; margin-bottom:5px; }
    .stat-label { font-size:13px; color:#6b7280; }
    .two-col { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
    .card { background:#fff; border-radius:16px; padding:22px; border:1px solid rgba(0,0,0,0.06); }
    .card-title { font-size:16px; font-weight:700; margin-bottom:16px; }
    .weak-row { margin-bottom:14px; }
    .weak-label { display:flex; justify-content:space-between; font-size:13px; margin-bottom:6px; }
    .weak-bar { height:8px; background:#f3f4f6; border-radius:100px; overflow:hidden; }
    .weak-fill { height:100%; border-radius:100px; }
    .dist-bar-wrap { display:flex; align-items:flex-end; gap:8px; height:140px; margin-top:16px; }
    .dist-bar-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; }
    .dist-bar { width:100%; border-radius:6px 6px 0 0; transition:height .4s; min-height:10px; }
    .dist-label { font-size:11px; color:#9ca3af; }
    .dist-val { font-size:12px; font-weight:700; }
    .empty-card { padding:18px; border-radius:14px; background:#fafafe; border:1px dashed rgba(99,102,241,0.22); color:#6b7280; font-size:13px; line-height:1.6; }
    @media(max-width:900px){ .page-body{padding:20px;} .stats-grid{grid-template-columns:1fr 1fr;} .two-col{grid-template-columns:1fr;} }
  </style>
</head>
<body>
<div id="dash-nav"></div>
<div class="page-body">
  <div class="page-title">📈 Class Analytics</div>
  <div class="page-sub">Performance overview across all students</div>

  <div class="stats-grid">
    <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-val" id="stat-students" style="color:#6366f1">0</div><div class="stat-label">Total Students</div></div>
    <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-val" id="stat-completion" style="color:#10b981">0%</div><div class="stat-label">Completion Rate</div></div>
    <div class="stat-card"><div class="stat-icon">📊</div><div class="stat-val" id="stat-average" style="color:#f59e0b">0%</div><div class="stat-label">Average Score</div></div>
    <div class="stat-card"><div class="stat-icon">❓</div><div class="stat-val" id="stat-questions" style="color:#ec4899">0</div><div class="stat-label">Questions in Bank</div></div>
  </div>

  <div class="two-col">
    <div class="card">
      <div class="card-title">📊 Score Distribution</div>
      <div id="score-distribution"></div>
    </div>
    <div class="card">
      <div class="card-title">🎯 Weakest Topics (Class-wide)</div>
      <div id="weakest-topics"></div>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
  initNav('analytics');

  const workspace = getTeacherWorkspace();
  const analytics = getTeacherAnalytics(workspace);

  document.getElementById('stat-students').textContent = analytics.totalStudents;
  document.getElementById('stat-completion').textContent = `${analytics.completionRate}%`;
  document.getElementById('stat-average').textContent = `${analytics.classAvgScore}%`;
  document.getElementById('stat-questions').textContent = analytics.totalQuestions;

  document.getElementById('score-distribution').innerHTML = workspace.questionBank.length
    ? `
      <div class="dist-bar-wrap">
        ${analytics.distribution.map((item) => `
          <div class="dist-bar-item">
            <div class="dist-val">${item.value}</div>
            <div class="dist-bar" style="height:${Math.max(10, item.value * 16)}px;background:${item.color}"></div>
            <div class="dist-label">${item.label}</div>
          </div>`).join('')}
      </div>`
    : '<div class="empty-card">No score data yet. Once students complete exams, the score distribution chart will appear here.</div>';

  document.getElementById('weakest-topics').innerHTML = analytics.weakestTopics.length
    ? analytics.weakestTopics.map((item, index) => {
        const colors = [
          'linear-gradient(90deg,#ef4444,#f87171)',
          'linear-gradient(90deg,#f59e0b,#fbbf24)',
          'linear-gradient(90deg,#10b981,#34d399)',
          'linear-gradient(90deg,#6366f1,#8b5cf6)',
          'linear-gradient(90deg,#ec4899,#f43f5e)'
        ];
        return `
          <div class="weak-row">
            <div class="weak-label"><span>${item.name}</span><span style="color:#6b7280">${item.pct}%</span></div>
            <div class="weak-bar"><div class="weak-fill" style="width:${item.pct}%;background:${colors[index % colors.length]}"></div></div>
          </div>`;
      }).join('')
    : '<div class="empty-card">No weak-topic analysis yet. Add questions and wait for real student attempts to build class analytics.</div>';
</script>
</body>
</html>
